<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página no encontrada — Olivacraft</title>
    <meta name="description" content="Esta página no existe. Vuelve al inicio de Olivacraft.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css">
    <style>
        .error-section {
            min-height: calc(100vh - var(--header-height) - 14rem);
            display: flex;
            align-items: center;
            justify-content: center;
            padding-block: var(--space-8);
            background-color: var(--color-bg);
        }

        .error-section__content {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: var(--space-3);
            max-width: 36rem;
        }

        .error-section__code {
            font-size: clamp(5rem, 18vw, 9rem);
            font-weight: var(--weight-bold);
            letter-spacing: -0.06em;
            line-height: 1;
            color: var(--color-accent);
            user-select: none;
        }

        .error-section__title {
            font-size: clamp(1.5rem, 4vw, 2.25rem);
            font-weight: var(--weight-bold);
            letter-spacing: -0.03em;
            color: var(--color-text);
            line-height: var(--leading-tight);
        }

        .error-section__description {
            font-size: var(--text-md);
            color: var(--color-text-soft);
            line-height: var(--leading-relaxed);
            max-width: 34ch;
        }

        .error-section__actions {
            margin-top: var(--space-2);
        }
    </style>
</head>

<body>

    <a href="#main-content" class="skip-link">Saltar al contenido principal</a>

 

    <main id="main-content" role="main">
        <section class="error-section" aria-labelledby="error-title">
            <div class="error-section__content">
                <span class="error-section__code" aria-hidden="true">404</span>
                <h1 id="error-title" class="error-section__title">Esta página no existe</h1>
                <p class="error-section__description">La URL que buscas no está disponible. Puede que haya cambiado o que simplemente nunca haya existido.</p>
                <div class="error-section__actions">
                    <a href="index.html" class="btn btn--primary">Volver al inicio →</a>
                </div>
            </div>
        </section>
    </main>

   

    <script>
        (function() {
            var themeButton = document.querySelector(".site-header__theme-button");
            var root = document.documentElement;
            if (themeButton) {
                function applyTheme(theme) {
                    root.setAttribute("data-theme", theme);
                    localStorage.setItem("theme", theme);
                    themeButton.setAttribute("aria-label", theme === "dark" ? "Cambiar a modo claro" : "Cambiar a modo oscuro");
                }
                applyTheme(localStorage.getItem("theme") || "light");
                themeButton.addEventListener("click", function() {
                    applyTheme(root.getAttribute("data-theme") === "dark" ? "light" : "dark");
                });
            }
            var header = document.querySelector(".site-header");
            if (header) {
                function updateHeader() {
                    header.classList.toggle("is-scrolled", window.scrollY > 8);
                }
                updateHeader();
                window.addEventListener("scroll", updateHeader, { passive: true });
            }
        })();
    </script>

</body>

</html>
